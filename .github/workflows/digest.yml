name: 3R Human Capital Digest

on:
  schedule:
    # Every Monday at 06:00 UTC = 09:00 Kyiv time (UTC+3)
    - cron: "0 7 * * 1"  # Monday 07:00 UTC = 10:00 Kyiv (UTC+3)
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  run-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check sent history
        run: |
          mkdir -p sent_history
          if [ -f sent_history/sent_urls.json ]; then
            echo "Sent history loaded: $(cat sent_history/sent_urls.json | python3 -c 'import json,sys; d=json.load(sys.stdin); print(len(d), "entries")')"
          else
            echo "No sent history yet — first run"
          fi

      - name: Run digest agent
        env:
          ANTHROPIC_API_KEY:            ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER:                   ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:           ${{ secrets.GMAIL_APP_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON:  ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_NAME:            "3R Human Capital Digest"
          NEWSAPI_KEY:                  ${{ secrets.NEWSAPI_KEY }}
          SERPER_API_KEY:               ${{ secrets.SERPER_API_KEY }}
          TEST_MODE:                     "false"
          GITHUB_TOKEN:                 ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p logs sent_history
          python src/digest_agent.py

      - name: Commit sent history + digests back to repo
        run: |
          git config user.name  "3R Digest Bot"
          git config user.email "bot@3r-digest"
          git add sent_history/ digests/ || true
          git diff --cached --quiet || git commit -m "chore: update sent history + digest [skip ci]"
          git push || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-logs-${{ github.run_number }}
          path: logs/
          retention-days: 30
